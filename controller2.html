<!DOCTYPE html>
<html ng-app="clickApp">
<head>
    <title>Click Counter</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="clickController">

    <p>Total Clicks: {{ clicks }}</p>

    <button ng-click="addClick()">Increase Count</button>

    <script>
        var application = angular.module("clickApp", []);

        application.controller("clickController", function($scope) {
            $scope.clicks = 0;

            $scope.addClick = function() {
                $scope.clicks = $scope.clicks + 1;
            };
        });
    </script>

</body>
</html>
