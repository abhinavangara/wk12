<!DOCTYPE html>
<html ng-app="myClickProject">
<head>
    <title>Button Counter</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body>

<div ng-controller="mainCtrl">

    <h4>You pressed the button {{ total }} times</h4>

    <button ng-click="update(total)">Press</button>

</div>

<script>
    angular.module("myClickProject", [])
    .controller("mainCtrl", function($scope) {

        $scope.total = 0;

        $scope.update = function(value) {
            $scope.total = value + 1;
        };

    });
</script>

</body>
</html>
